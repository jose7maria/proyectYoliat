<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO DE REGISTRO</title>
</head>
<body>
    <h2 align="center">Formulario de Registro</h2>

<form action="#" method="post">
    <table border="0" align="center" cellpadding="8">

        <tr>
            <td><label for="nombre">Nombre completo:</label></td>
            <td>
                <input type="text" id="nombre" name="nombre"
                required minlength="3"
                pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+"
                title="Solo letras y espacios, mínimo 3 caracteres">
            </td>
        </tr>

        <tr>
            <td><label for="correo">Correo electrónico:</label></td>
            <td>
                <input type="email" id="correo" name="correo" required>
            </td>
        </tr>

        <tr>
            <td><label for="usuario">Usuario:</label></td>
            <td>
                <input type="text" id="usuario" name="usuario"
                required minlength="4"
                title="Mínimo 4 caracteres">
            </td>
        </tr>

        <tr>
            <td><label for="password">Contraseña:</label></td>
            <td>
                <input type="password" id="password" name="password"
                required minlength="6"
                pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}"
                title="Mínimo 6 caracteres, al menos una letra y un número">
            </td>
        </tr>

        <tr>
            <td><label for="confirmar">Confirmar contraseña:</label></td>
            <td>
                <input type="password" id="confirmar" name="confirmar"
                required minlength="6">
            </td>
        </tr>

        <tr>
            <td><label for="telefono">Teléfono:</label></td>
            <td>
                <input type="tel" id="telefono" name="telefono"
                pattern="[0-9]{9}"
                title="Ingrese 9 números">
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Registrarse">
            </td>
        </tr>

    </table>
</form>
 
</body>
</html>
